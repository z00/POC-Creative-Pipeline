<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Pipeline Automation PoC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>Creative Pipeline Automation PoC</h1>

    <section id="campaign-form">
        <h3>Create New Campaign</h3>
        <div class="form-group">
            <label>Campaign Name</label>
            <input type="text" id="name" placeholder="Enter campaign name..." required
                oninput="this.style.borderColor=''">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Region</label>
                <input type="text" id="region" placeholder="e.g., Japan" required oninput="this.style.borderColor=''">
            </div>
            <div class="form-group">
                <label>Target Audience</label>
                <input type="text" id="audience" placeholder="e.g., Hikers" required
                    oninput="this.style.borderColor=''">
            </div>
        </div>

        <div class="form-group">
            <label>Campaign Message</label>
            <textarea id="message" placeholder="Describe the campaign vibe..." required
                oninput="this.style.borderColor=''"></textarea>
        </div>

        <div id="products-section">
            <h4>Products (Minimum 2 required)</h4>
            <div id="validation-error" class="error-msg"></div>
            <div id="products-container">
                <div class="product-entry">
                    <input type="text" class="prod-name" placeholder="Product Name" required
                        oninput="this.style.borderColor=''">
                    <input type="text" class="prod-desc" placeholder="Product Description" required
                        oninput="this.style.borderColor=''">
                    <label><small>Base Image (optional):</small></label>
                    <div class="file-input-wrapper">
                        <input type="file" class="prod-file" accept="image/*" onchange="updateFileLabel(this)">
                        <button class="clear-file-btn" onclick="clearFileInput(this)" type="button">Clear</button>
                    </div>
                </div>
                <div class="product-entry">
                    <input type="text" class="prod-name" placeholder="Product Name" required
                        oninput="this.style.borderColor=''">
                    <input type="text" class="prod-desc" placeholder="Product Description" required
                        oninput="this.style.borderColor=''">
                    <label><small>Base Image (optional):</small></label>
                    <div class="file-input-wrapper">
                        <input type="file" class="prod-file" accept="image/*" onchange="updateFileLabel(this)">
                        <button class="clear-file-btn" onclick="clearFileInput(this)" type="button">Clear</button>
                    </div>
                </div>
            </div>
            <button type="button" onclick="addProductRow()">+ Add Another Product</button>
        </div>
        <button id="generate-btn" class="primary-blue-btn" onclick="submitCampaign()">Generate Assets</button>
    </section>

    <hr>

    <section id="results">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Generated Campaigns</h3>
            <button onclick="loadCampaigns()">Refresh List</button>
        </div>
        <div id="campaign-list"></div>
    </section>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img class="modal-content" id="full-image">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", loadCampaigns);

        function updateFileLabel(input) {
            const btn = input.parentElement.querySelector('.clear-file-btn');
            btn.style.display = input.files.length > 0 ? 'inline-block' : 'none';
        }

        function clearFileInput(btn) {
            btn.closest('.file-input-wrapper').querySelector('.prod-file').value = "";
            btn.style.display = 'none';
        }

        function addProductRow() {
            const div = document.createElement('div');
            div.className = 'product-entry';
            div.innerHTML = `
                <input type="text" class="prod-name" placeholder="Product Name" required oninput="this.style.borderColor=''">
                <input type="text" class="prod-desc" placeholder="Product Description" required oninput="this.style.borderColor=''">
                <label><small>Base Image (optional):</small></label>
                <div class="file-input-wrapper">
                    <input type="file" class="prod-file" accept="image/*" onchange="updateFileLabel(this)">
                    <button class="clear-file-btn" onclick="clearFileInput(this)" type="button">Clear</button>
                </div>
                <button type="button" class="remove-prod-btn" onclick="this.parentElement.remove()">Remove Product</button>
            `;
            document.getElementById('products-container').appendChild(div);
        }

        // Logic to clear ALL form inputs
        function resetForm() {
            document.getElementById('name').value = "";
            document.getElementById('region').value = "";
            document.getElementById('audience').value = "";
            document.getElementById('message').value = "";

            // Clear products and reset to the default 2 rows
            document.getElementById('products-container').innerHTML = '';
            addProductRow();
            addProductRow();

            // Hide any validation messages
            document.getElementById('validation-error').style.display = 'none';
        }

        function fixImagePath(p) {
            if (!p) return '';
            let c = p.replace(/\\/g, '/').replace(/storageinputs/g, 'storage/inputs/').replace(/storageoutputs/g, 'storage/outputs/');
            return c.startsWith('/') ? c : '/' + c;
        }

        async function submitCampaign() {
            const err = document.getElementById('validation-error');
            const btn = document.getElementById('generate-btn');
            err.style.display = 'none';

            const rows = document.querySelectorAll('.product-entry');
            const products = [];
            const formData = new FormData();
            let valid = true;

            rows.forEach((row, i) => {
                const n = row.querySelector('.prod-name');
                const d = row.querySelector('.prod-desc');
                const f = row.querySelector('.prod-file');
                if (!n.value.trim() || !d.value.trim()) {
                    valid = false;
                    n.style.borderColor = 'var(--error-red)';
                    d.style.borderColor = 'var(--error-red)';
                } else {
                    if (f.files.length > 0) formData.append('files', f.files[0]);
                    products.push({
                        id: String(i + 1),
                        name: n.value.trim(),
                        description: d.value.trim(),
                        asset_filename: f.files.length > 0 ? f.files[0].name : null
                    });
                }
            });

            if (!valid || rows.length < 2) {
                err.textContent = rows.length < 2 ? "Error: 2 products required." : "Error: Fill all fields.";
                err.style.display = 'block';
                return;
            }

            const payload = {
                campaign_name: document.getElementById('name').value,
                target_region: document.getElementById('region').value,
                target_audience: document.getElementById('audience').value,
                campaign_message: document.getElementById('message').value,
                products: products
            };

            try {
                // UI FEEDBACK: Disable and Rename
                btn.textContent = "Generating...";
                btn.disabled = true;

                formData.append('campaign_data', JSON.stringify(payload));
                await fetch('/campaigns/', { method: 'POST', body: formData });

                resetForm(); // Reset form after successful generation
                await loadCampaigns();
            } catch (e) {
                err.textContent = "Error: " + e.message;
                err.style.display = 'block';
            } finally {
                // RESET UI: Re-enable
                btn.disabled = false;
                btn.textContent = "Generate Assets";
            }
        }

        async function loadCampaigns() {
            const list = document.getElementById('campaign-list');
            // Select the refresh button specifically
            const refreshBtn = document.querySelector('#results button[onclick="loadCampaigns()"]');

            try {
                // UI FEEDBACK
                if (refreshBtn) {
                    refreshBtn.disabled = true;
                    refreshBtn.textContent = "Refreshing...";
                }

                const res = await fetch('/campaigns/');
                const data = await res.json();

                if (!data.length) {
                    list.innerHTML = "<p>No campaigns yet.</p>";
                    return;
                }

                list.innerHTML = data.map(c => {
                    const prods = c.brief.products.map(p => {
                        const out = (c.generated_assets[p.name] || []).map(a =>
                            `<img src="${fixImagePath(a)}" class="img-preview" onclick="openFullSize(this.src)">`
                        ).join('');

                        return `<div style="margin-top:15px; border-top:1px solid var(--neutral-border); padding-top:10px;">
                            <div class="product-header">
                                <strong>${p.name}</strong> 
                                <a href="/campaigns/${c.id}/download/${p.name}" class="download-all-link">Download All</a>
                            </div>
                            <div class="image-row">${out}</div>
                        </div>`;
                    }).join('');

                    return `<div class="campaign-card">
                        <button class="delete-campaign-btn" onclick="deleteCampaign('${c.id}')">Delete</button>
                        <h4>${c.brief.campaign_name} <span class="status-badge">${c.status}</span></h4>
                        <p><small>${c.brief.target_audience} | ${c.brief.target_region}</small></p>
                        ${prods}
                    </div>`;
                }).reverse().join('');

            } catch (e) {
                list.innerHTML = "Error loading list.";
            } finally {
                // RESET UI
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.textContent = "Refresh List";
                }
            }
        }

        async function deleteCampaign(id) {
            if (confirm("Delete this campaign permanently?")) {
                await fetch(`/campaigns/${id}`, { method: 'DELETE' });
                resetForm(); // Reset form when a campaign is deleted
                loadCampaigns();
            }
        }

        function openFullSize(s) {
            const m = document.getElementById('image-modal');
            document.getElementById('full-image').src = s;
            m.style.display = "flex";
        }
    </script>
</body>

</html>
